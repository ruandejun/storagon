    <link href="/static/assets/frontend/css/app.css" rel="stylesheet">
    <link rel="shortcut icon" href="/static/assets/frontend/images/junshare.png" />
    <script type="text/javascript">
        {% load cache %}
        {% cache 600 CURRENT_USER request.user.username %}
        {% if user.is_authenticated %}
            var CURRENT_USER = {
                username: '{{user.username}}',
                id: {{user.id}},
                email: '{{user.email}}',
                is_active: '{{user.is_active}}',
                is_staff: '{{user.is_staff}}',
                last_login: '{{user.last_login}}',
                first_name: '{{user.first_name}}',
                last_name: '{{user.last_name}}'
            };
            {% else %}
            CURRENT_USER = null;
        {% endif %}
        {% endcache %}
    </script>
    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
      ga('create', 'UA-62259564-1', 'auto');
      if(CURRENT_USER !== null){
        ga('set','&uid', CURRENT_USER.id);
      }
      ga('require', 'linkid', 'linkid.js');
    </script>

</head>
<body {% verbatim %} class="{{ bodyClass }}" {% endverbatim %}>
  <!-- BEGIN: App-Loading Screen. -->
  <div id="loader-wrapper">
      <div class="text-center">
        <img id="loading-image" src="/static/assets/frontend/images/loading.gif" alt="Loading..." />
        <div class="perc">1%</div>
      </div>
  </div>
  <!-- END: App-Loading Screen. -->
  <div ng-include src="'/static/assets/frontend/app_junshare/layout/header.html'"></div>
  <div class="content">
    {% verbatim %}
    <div id="main" ng-animate-children="">
      <div ng-view autoscroll=""></div>          
    </div>
    {% endverbatim %}
  </div>    
  <div ng-include src="'/static/assets/frontend/app_junshare/layout/footer.html'" ng-show="showFooter"></div>
  <div ng-include src="'/static/assets/frontend/app_junshare/layout/panel.html'" ng-hide="showPanel"></div>
<!--  <a href="javascript:void(0)" id="back-to-top"><i class="fa fa-angle-up"></i></a>-->

  {# javascript #}    
  <script src="/static/assets/frontend/js/vendor/modernizr.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.0/jquery.min.js"></script>
  <script src="/static/assets/frontend/js/resumablejunshare.js"></script>
  <script type="text/javascript">
    jQuery.cachedScript = function( url, options ) {
      options = $.extend( options || {}, {
        dataType: "script",
        cache: true,
        url: url
      });
      return jQuery.ajax( options );
    };
    $.cachedScript("/static/assets/frontend/js/jquery.preload2.min.js").done(function(script, textStatus) {
      var loader = $(document).preload({
        OnStep: function(percent) {
          $(".perc").html(percent + "%");
        },
        OnComplete: function() {
          $('.test-speed').remove();
          $('#loader-wrapper').fadeOut(1000, function(){
            angular.bootstrap( document, [ "Storagon" ] );
            if(navigator.appName === "Microsoft Internet Explorer"){
              $('#modal-notice-browser').foundation('reveal', 'open');
            }
          });
        }
      });
    });
  </script>
  <script type="text/javascript">
    var _gaq = _gaq || [];
    var pluginUrl =
    '//www.google-analytics.com/plugins/ga/inpage_linkid.js';
    _gaq.push(['_require', 'inpage_linkid', pluginUrl]);
    _gaq.push(['_setAccount', 'UA-62259564-1']);
    _gaq.push(['_setDomainName', 'storagon.com']);
    _gaq.push(['_trackPageview']);
    (function() {
      var ga = document.createElement('script'); ga.type = 'text/javascript'; ga.async = true;
      ga.src = ('https:' == document.location.protocol ? 'https://ssl' : 'http://www') + '.google-analytics.com/ga.js';

    })();
  </script>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.16/angular-route.min.js" defer></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.16/angular-cookies.min.js" defer></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.16/angular-animate.min.js" defer></script>

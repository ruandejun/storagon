<div class="container">
    <div class="row">
        <div class="col-md-2">
            <div ng-include src="'/static/assets/frontend/app_junshare/user/sidebar.html'"></div>
        </div>
        <div class="col-md-10">
          <h4>Request History</h4>
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>Action</th>
                <th>Status</th>
                <th>Created date</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="applyHistory in applyHistories">
                <td>{{applyHistory.apply_type | enumApplyType}}</td>
                <td class="{{ (applyHistory.apply_status === 0 || applyHistory.apply_status === 1) ? 'success' : 'danger' }}">{{applyHistory.apply_status | enumApplyStatus}}</td>
                <td>{{ applyHistory.created_date | date:'medium':'UTC' }}</td>
              </tr>
            </tbody>
          </table>
        </div>

    </div>
</div>

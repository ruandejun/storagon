
user  TVA; #remember to set this to user that you store project folder in
worker_processes  4;

worker_rlimit_nofile 10240;
worker_rlimit_sigpending 32768;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;
error_log  /home/TVA/log/nginx/error.log  crit;

#pid		logs/nginx.pid;


events {
	worker_connections  2048;
}


http {
	include	   mime.types;
	default_type  application/octet-stream;

	log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
					  '$status $body_bytes_sent "$http_referer" '
					  '"$http_user_agent" "$http_x_forwarded_for"';

	
	access_log  on;
    limit_conn_log_level info;
	
	log_format  xfs  '"$request"|$http_range|$remote_addr|$body_bytes_sent|$status';
    log_format  xfs_p  '$arg_id|$arg_usr|$remote_addr|$body_bytes_sent|$status';

	sendfile		on;
	#tcp_nopush	 on;

	reset_timedout_connection on;

    server_tokens off;
    autoindex off;

	keepalive_timeout  0;
	#keepalive_timeout  65;

	limit_conn_zone $binary_remote_addr zone=one:10m;
	
	#gzip  on;

	underscores_in_headers on;

	server {
		listen	   8000;
		server_name  localhost;
		client_max_body_size 100M;
		client_body_buffer_size 10M;

		proxy_set_header X_REAL_IP $remote_addr;
		proxy_pass_header SIGNATURE_AUTHORIZATION;
		
		#charset koi8-r;

		#access_log /var/log/nginx/host.access.log main;
		
		#redirect all serverfile request to uwsgi
		location /sf/ {
			include uwsgi_params;
			uwsgi_pass 127.0.0.1:8889;
		}
		
		location /media/ {
			alias /media/;
			internal;
			sendfile on;
			limit_rate 500k;
			limit_conn one 2;
			access_log  /home/TVA/log/nginx/traffic.log xfs;
			add_header Access-Control-Allow-Origin *;
		}
		
		location /nolimit/media/ {
			alias /media/;
			internal;
			sendfile on;
			limit_rate 6000k;
			limit_conn one 100;
			access_log  /home/TVA/log/nginx/traffic.log xfs;
			add_header Access-Control-Allow-Origin *;
		}

		location /direct/media/ {
			alias /media/;

			satisfy any;
			auth_basic           "closed site";
			auth_basic_user_file /home/TVA/storagon/htpasswd.txt;

			limit_conn one 100;
			#access_log  /var/log/nginx/traffic.log xfs;
			add_header Access-Control-Allow-Origin *;
		}

		#error_page  404			  /404.html;

		# redirect server error pages to the static page /50x.html
		#
		error_page   500 502 503 504  /50x.html;
		location = /50x.html {
			root   html;
		}

	}

}

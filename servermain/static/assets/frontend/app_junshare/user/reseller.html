<div class="container">
  <div class="row">
    <div class="col-md-2">
      <div ng-include src="'/static/assets/frontend/app_junshare/user/sidebar.html'"></div>
    </div>
    <div class="col-md-10">
      <h3>Your Current Credit Balance {{ creditBalance | currency }}</h3>
      <a href="javascript:;" data-reveal-id="planModal" class="btn btn-success">Purchase Premium Key</a>
      <hr>
      <h4>Premium Key List</h4>
      <table role="grid" class="table table-bordered">
        <thead>
          <tr>
            <th>Premium Code</th>
            <th>Created</th>
            <th>UID</th>
            <th>Activated</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="credit in credits">
            <th>{{credit.fields.code}}</th>
            <th>{{credit.fields.created_date| date:'medium'}}</th>
            <th>{{credit.fields.activated_user}}</th>
            <th>{{credit.fields.activated_date| date:'medium'}}</th>
          </tr>
        </tbody>
      </table>
    </div>


  </div>
  <div ng-include src="'/static/assets/frontend/app_junshare/layout/modals.html'"></div>
</div>

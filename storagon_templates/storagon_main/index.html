    <script type="text/javascript">
      jQuery.cachedScript = function( url, options ) {
        options = $.extend( options || {}, {
          dataType: "script",
          cache: true,
          url: url
        });
        return jQuery.ajax( options );
      };
      $.cachedScript("/static/assets/frontend/js/jquery.preload.min.js").done(function(script, textStatus) {
        var loader = $(document).preload({          
          OnStep: function(percent) {        
            $(".perc").html(percent + "%");
          },
          OnComplete: function() {            
            $('.test-speed').remove();
            $('#loader-wrapper').fadeOut(2000, function(){
              angular.bootstrap( document, [ "Storagon" ] );              
              if(navigator.appName === "Microsoft Internet Explorer"){
                $('#modal-notice-browser').foundation('reveal', 'open');
              }
            });                  
          }
        });
      });
    </script>

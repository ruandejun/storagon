<div class="padding-top-30 padding-bottom-30">
  <div class="row padding-bottom-100">
    <div class="large-10 push-2 columns">
      <div class="clearfix">
        <h5 class="left">Report</h5>
        <button class="button tiny right" id="report" data-reveal-id="modal-report">
          Create report
        </button>                
      </div>
      <table role="grid" class="table fixed_layout">
        <thead>
          <tr>
            <th>Report Kind</th>
            <th>Status</th>
            <th>Detail</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="report in reports">
            <td>{{report.text}}</td>
            <td class="{{(report.status| enumSessionStatus: report.status === 'completed') ? 'success' : 'danger'}}">{{report.status| enumSessionStatus: report.status}}</td>
            <td>{{(report.data.detail === "") ? report.data.file_link : report.data.detail}}</td>
            <td>{{report.created | date:'medium'}}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="large-2 pull-10 columns">
      <div ng-include src="'/static/assets/frontend/app/user/sidebar.html'"></div>
    </div>
  </div>
  <div ng-include src="'/static/assets/frontend/app/layout/modals.html'"></div>
</div>

<script>
  $(document).foundation();
</script>

<div class="container">
    <div class="row">
        <div class="col-md-2">
            <div ng-include src="'/static/assets/frontend/app_junshare/user/sidebar.html'"></div>
        </div>
        <div class="col-md-10">
          <h4>Billing Information</h4>
          <table role="grid" class="table fixed_layout">
            <thead>
              <tr>
                <th>ID</th>
                <th>Plan</th>
                <th>Bill Amount</th>
                <th>Date</th>
                <th>Bill ID</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="bill in bills">
                <td>{{bill.pk}}</td>
                <td>{{bill.fields.plan_id}}</td>
                <td class="success">{{bill.fields.money_charged | amount : 0}}</td>
                <td>{{bill.fields.created_date | date:'medium'}}</td>
                <td>{{bill.fields.detail._id.$oid}}</td>
              </tr>
            </tbody>
          </table>
        </div>

    </div>
</div>

<div class="padding-top-30 padding-bottom-30">
  <div class="row padding-bottom-100">
    <div class="large-10 push-2 columns">
      <h4 class="left">Your Current Credit Balance {{ creditBalance | currency }}</h4>
      <span class="right"><a href="javascript:;" data-reveal-id="planModal" class="button tiny">Purchase Premium Key</a></span>
      <hr>
      <div class="row">
        <div class="large-12 columns">
          <h5>Premium Key List</h5>
        </div>
      </div>
      <table role="grid" class="table fixed_layout">
        <thead>
          <tr>
            <th>Premium Code</th>
            <th>Created</th>
            <th>UID</th>
            <th>Activated</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="credit in credits">
            <td>{{credit.fields.code}}</td>                  
            <td>{{credit.fields.created_date| date:'medium'}}</td>   
            <td>{{credit.fields.activated_user}}</td>
            <td>{{credit.fields.activated_date| date:'medium'}}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="large-2 pull-10 columns">
      <div ng-include src="'/static/assets/frontend/app/user/sidebar.html'"></div>
    </div>
  </div>
  <div ng-include src="'/static/assets/frontend/app/layout/modals.html'"></div>
</div>
<script type="text/javascript">
    $(document).ready(function () {
        $(document).foundation();
    })
</script>

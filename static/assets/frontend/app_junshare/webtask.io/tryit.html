    <script type="text/javascript">$(function () {
        var copy = {};
        ['copy_curl_code', 'copy_ajax_code', 'copy_node_code', 'copy_logs_code']
                .forEach(function (b) {
                    copy[b] = new ZeroClipboard(document.getElementById(b));
                });
        var machinestr = 'your-machine$:~ ';

        // Manage states of generated code menu
        $('.wt-codegen').click(function () {
            $('.wt-codegen').each(function () {
                $(this).parent().removeClass('pure-menu-selected');
            });
            $(this).parent().addClass('pure-menu-selected');
            $('.wt-runnable-code').hide();
            $($(this).attr('href')).show();
            return false;
        });

        var webtaskCode = CodeMirror.fromTextArea(
                document.getElementById('webtaskCode'), {
                    mode: "javascript",
                    lineNumbers: true,
                    lineWrapping: true,
                    theme: 'neo'
                });
        webtaskCode.setSize('100%', 200);

        var webtaskResult = CodeMirror.fromTextArea(
                document.getElementById('webtaskResult'), {
                    mode: "shell",
                    lineNumbers: false,
                    lineWrapping: true,
                    readOnly: true,
                    theme: 'shell'
                });

        webtaskResult.setSize('100%', 150);
        webtaskResult.getDoc().setValue(machinestr);

        $('.js-task-slider').taskSlider({
            hammer: true,
            singleSlide: true,
            animationIn: 'fadeInRightAlt',
            animationInReversed: 'fadeInLeftAlt',
            durationIn: 400,
            afterNav: function ($button) {
                var selected = $button.val();
                update_sample(selected);
                window.location.hash = '#' + selected.substring(7);
            }
        });


        // Select sample
        $('#sample').change(function () {
            var selected = $(this).val();
            update_sample(selected);
            window.location.hash = '#' + selected.substring(7);
        });

        if (window.location.hash) {
            var sample = window.location.hash.substring(1);
            if ($('#sample_' + sample).size() === 1) {
                $('#sample').val('sample_' + sample);
                update_sample('sample_' + sample);
            }

            $('.js-task-slider').find('[value=' + 'sample_' + sample + ']').trigger('click');
        }

        var spinner = new Spinner({
            color: '#fff',
            lines: 12, // The number of lines to draw
            width: 2,
            length: 5, // The length of each line
            radius: 4, // The radius of the inner circle
            trail: 30, // Afterglow percentage
            top: '50%', // Top position relative to parent
            left: '50%' // Left position relative to parent
        });

        webtaskCode.on('change', update_generated_code);
        $('#url_query').keyup(update_generated_code);

        update_generated_code();
        $('#curl').show();
        $('#run').click(function () {
            get_preview();
            return false;
        });

        function update_sample(sample) {
            var code = $('#' + sample)
                    .text()
                    .trim()
                    .replace(/\{\{/g, '<' + '%')
                    .replace(/\}\}/g, '%' + '>');
            webtaskCode.getDoc().setValue(code);
            webtaskResult.getDoc().setValue(machinestr);
            $('#webtask_container').val('{webtask_container1}');

        }

        function update_generated_code() {
            var code = webtaskCode.getValue();
            var query = get_query();
            var container = $('#webtask_container').val() || '{webtask_container1}';

            var curl_code = 'cat << EOF | curl https://webtask.it.auth0.com/api/run/' + container
                    + query.replace(/\&/g, '\\&') + ' \\\n'
                    + '  -H \'Authorization: Bearer {webtask_token}\' \\\n'
                    + '  -d @-\n'
                    + code
                    + '\nEOF';

            $('#curl_code').text(curl_code);
            $('#copy_curl_code').attr('data-clipboard-text', curl_code);

            var ajax_code = '$.ajax({\n'
                    + '  url: \'https://webtask.it.auth0.com/api/run/' + container + query + '\',\n'
                    + '  method: \'POST\',\n'
                    + '  data: ' + JSON.stringify(code) + ',\n'
                    + '  headers: {\n'
                    + '    Authorization: \'Bearer {webtask_token}\'\n'
                    + '  },\n'
                    + '  dataType: \'text\',\n'
                    + '}).done(function (data) {\n'
                    + '  alert(data);\n'
                    + '}).fail(function (xhr, status, error) {\n'
                    + '  alert(error);\n'
                    + '});';

            $('#ajax_code').text(ajax_code);
            $('#copy_ajax_code').attr('data-clipboard-text', ajax_code);

            var node_code = 'var options = {\n'
                    + '  hostname: \'webtask.it.auth0.com\',\n'
                    + '  path: \'/api/run/' + container + query + '\',\n'
                    + '  method: \'POST\',\n'
                    + '  headers: {\n'
                    + '    Authorization: \'Bearer {webtask_token}\'\n'
                    + '  }\n'
                    + '};\n\n'
                    + 'require(\'https\').request(options, function(res) {\n'
                    + '  console.log(\'HTTP status: \', res.statusCode);\n'
                    + '  res.on(\'data\', function(d) {\n'
                    + '    process.stdout.write(d);\n'
                    + '  });\n'
                    + '}).on(\'error\', function(e) {\n'
                    + '  console.error(e);\n'
                    + '}).end(' + JSON.stringify(code) + ');';

            $('#node_code').text(node_code);
            $('#copy_node_code').attr('data-clipboard-text', node_code);

            var logs_code = 'curl -N -s https://webtask.it.auth0.com/api/logs/tenant/' + container
                    + ' -H \'Authorization: Bearer {webtask_token}\'';

            $('#logs_code').text(logs_code);
            $('#copy_logs_code').attr('data-clipboard-text', logs_code);

            $('.prettyprint').removeClass('prettyprinted');

            prettyPrint();
        }

        var ajax_in_progress, preview_pending;

        function get_preview() {
            if (ajax_in_progress) {
                preview_pending = true;
                return;
            }
            var ltimer = loading();
            var lastStep = '';

            var container = $('#webtask_container').val() || '{webtask_container1}';
            webtaskResult.getDoc().setValue('');
            var payload = webtaskCode.getValue();
            ajax_in_progress = true;
            var start = Date.now();

            $.ajax({
                data: payload,
                dataType: 'text',
                type: 'POST',
                url: 'https://webtask.it.auth0.com/api/run/' + container + get_query(),
                headers: {
                    Authorization: 'Bearer {webtask_token}'
                }
            }).always(function () {
                clearTimeout(ltimer);
                ajax_in_progress = false;
                if (preview_pending) {
                    preview_pending = false;
                    get_preview();
                }
            }).done(function (data, status, xhr) {
                setResult(xhr, data);
            }).fail(function (xhr, status, error) {
                setResult(xhr, xhr.responseText || error);
            });

            function setResult(xhr, data) {
                try {
                    data = JSON.stringify(JSON.parse(data), null, 2);
                }
                catch (e) {
                    // ignore
                }
                data = 'HTTP status: ' + xhr.status + '\n'
                + 'Response time: ' + (Date.now() - start) + 'ms\n'
                + data;

                printResult(lastStep + '\n\n' + data);
            }

            function printResult(result) {
                var curl = machinestr + 'curl ' + 'https://webtask.it.auth0.com'
                        + '/api/run/' + '{webtask_container1}'
                        + ' -H "Authorization: Bearer {{your_token}}"'
                        + ' -d "' + "@webtask.js" + '"';

                webtaskResult.getDoc().setValue(curl + '\n\n' + result);
            }

            function loading() {
                var steps = ['|', '/', '-', '\\', '|', '/', '-', '\\'];
                var lstep = 0;
                return setInterval(function () {
                    if (!(lstep < steps.length)) lstep = 0;
                    lastStep = steps[lstep];
                    printResult(steps[lstep++]);
                }, 100);
            }
        }

        function get_query() {
            var query = $('#url_query').val().trim();
            if (query && query[0] !== '?') {
                query = '?' + query;
            }
            return query;
        }
    });</script>

    <script id="sample_modules" type="text/plain">/* Use preinstalled Node.js modules: https://webtask.io/docs/101 */

var request = require('request');

return function (cb) {
    var start = Date.now();
    request.get('https://auth0.com', function (error, res, body) {
        if (error)
            cb(error);
        else
            cb(null, {
                status: res.statusCode,
                length: body.length,
                latency: Date.now() - start
            });
    });
}
    </script>
    <script id="sample_full_http" type="text/plain">/* More on programming models: https://webtask.io/docs/models */

return function (context, req, res) {
    res.writeHead(200, { 'Content-Type': 'text/html' });
    res.end(require('ejs').render(view.stringify(), {
        name: context.data.name || 'Anonymous'
    }));
}

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghi Chú Đang Khóa 🔐</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080b11;
            --panel-bg: rgba(13, 17, 28, 0.45);
            --border-color: rgba(255, 255, 255, 0.06);
            --primary-glow: #6366f1;
            --accent-glow: #e11d48;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .glowing-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 1;
            opacity: 0.35;
            pointer-events: none;
        }

        .orb-primary {
            width: 400px;
            height: 400px;
            background: var(--primary-glow);
            top: -100px;
            left: -100px;
            animation: float-orb 15s infinite alternate ease-in-out;
        }

        .orb-accent {
            width: 350px;
            height: 350px;
            background: var(--accent-glow);
            bottom: -80px;
            right: -80px;
            animation: float-orb-reverse 12s infinite alternate ease-in-out;
        }

        @keyframes float-orb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        @keyframes float-orb-reverse {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-40px, -20px) scale(1.05); }
        }

        .lock-card {
            width: 100%;
            max-width: 400px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: scale-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scale-up {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse-lock 2s infinite ease-in-out;
        }

        @keyframes pulse-lock {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f43f5e, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .form-input {
            width: 100%;
            background: rgba(8, 12, 22, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 4px;
        }

        .form-input:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.25);
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 20px;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 10px;
            padding: 14px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #232a3b;
            color: #5b6782;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @media (max-width: 480px) {
            .lock-card {
                padding: 24px 20px;
                margin: 16px;
            }
            .lock-icon {
                font-size: 38px;
                margin-bottom: 15px;
            }
            h2 {
                font-size: 18px;
            }
            p {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="glowing-orb orb-primary"></div>
    <div class="glowing-orb orb-accent"></div>

    <div class="lock-card">
        <span class="lock-icon">🔒</span>
        <h2>Ghi chú đã bị khóa</h2>
        <p>Ghi chú <strong>{{ note_id }}</strong> đã được thiết lập mật khẩu bảo vệ. Vui lòng nhập mật khẩu để mở khóa và chỉnh sửa.</p>

        <div class="error-message" id="errorBox">Mật khẩu không chính xác</div>

        <form id="passwordForm" onsubmit="verifyPassword(event)">
            <div class="form-group">
                <input type="password" id="passwordInput" class="form-input" placeholder="••••••" required autofocus autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn" class="btn">Mở khóa ghi chú</button>
        </form>
    </div>

    <!-- CSRF Token helper -->
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');

        async function verifyPassword(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('errorBox');

            errorBox.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang xác thực...';

            try {
                const response = await fetch(`/ghi/api/verify-password/{{ note_id }}/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    // Success, reload page
                    window.location.reload();
                } else {
                    const err = await response.json();
                    errorBox.textContent = err.message || 'Mật khẩu không chính xác';
                    errorBox.style.display = 'block';
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('passwordInput').focus();
                }
            } catch (err) {
                errorBox.textContent = 'Lỗi kết nối máy chủ';
                errorBox.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Mở khóa ghi chú';
            }
        }
    </script>
</body>
</html>

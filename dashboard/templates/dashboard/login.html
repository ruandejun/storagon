<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C69 Portal 🔐</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080b11;
            --panel-bg: rgba(13, 17, 28, 0.45);
            --border-color: rgba(255, 255, 255, 0.06);
            --primary-glow: #6366f1;
            --accent-glow: #00f2fe;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Glowing Background Objects */
        .glowing-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 1;
            opacity: 0.35;
            pointer-events: none;
        }

        .orb-primary {
            width: 450px;
            height: 450px;
            background: var(--primary-glow);
            top: -100px;
            left: -100px;
            animation: float-orb 15s infinite alternate ease-in-out;
        }

        .orb-accent {
            width: 400px;
            height: 400px;
            background: var(--accent-glow);
            bottom: -100px;
            right: -100px;
            animation: float-orb-reverse 12s infinite alternate ease-in-out;
        }

        @keyframes float-orb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.1); }
        }

        @keyframes float-orb-reverse {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, -30px) scale(1.05); }
        }

        /* Glassmorphism Login Card */
        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: scale-up 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scale-up {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .logo-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #00f2fe, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .logo-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background: rgba(8, 12, 22, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.25);
        }

        /* Error box */
        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 10px;
            padding: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background: #232a3b;
            color: #5b6782;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 18px;
            font-size: 13px;
        }

        .auth-links.center {
            justify-content: center;
        }

        .auth-links a {
            color: var(--primary-glow);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .auth-links a:hover {
            color: var(--accent-glow);
            text-decoration: underline;
        }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="glowing-orb orb-primary"></div>
    <div class="glowing-orb orb-accent"></div>

    <div class="login-card">
        <div class="logo-header">
            <h1 id="headerTitle">C69 Portal 🚀</h1>
            <p id="headerDesc">Hệ thống quản lý dịch vụ và khách hàng</p>
        </div>

        <div class="error-message" id="errorBox">Sai tài khoản hoặc mật khẩu.</div>

        <input type="hidden" id="csrfToken" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

        <!-- LOGIN FORM -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">TÀI KHOẢN</label>
                <input class="form-input" type="text" id="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">MẬT KHẨU</label>
                <input class="form-input" type="password" id="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Đăng Nhập</button>
            
            <div class="auth-links">
                <a href="#" onclick="showForm('register')">Đăng ký tài khoản</a>
                <a href="#" onclick="showForm('forgot')">Quên mật khẩu?</a>
            </div>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label class="form-label" for="regUsername">TÊN ĐĂNG NHẬP</label>
                <input class="form-input" type="text" id="regUsername" placeholder="Từ 6-30 ký tự (chữ, số, . _)" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="regEmail">EMAIL</label>
                <input class="form-input" type="email" id="regEmail" placeholder="Nhập địa chỉ email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="regPassword">MẬT KHẨU</label>
                <input class="form-input" type="password" id="regPassword" placeholder="Nhập mật khẩu bảo mật" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label class="form-label" for="regConfirmPassword">XÁC NHẬN MẬT KHẨU</label>
                <input class="form-input" type="password" id="regConfirmPassword" placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
            </div>

            <button type="submit" class="login-btn" id="registerBtn">Đăng Ký</button>
            
            <div class="auth-links center">
                <a href="#" onclick="showForm('login')">Đã có tài khoản? Đăng nhập</a>
            </div>
        </form>

        <!-- FORGOT PASSWORD FORM -->
        <form id="forgotForm" style="display: none;">
            <div class="form-group">
                <label class="form-label" for="forgotEmail">EMAIL KHÔI PHỤC</label>
                <input class="form-input" type="email" id="forgotEmail" placeholder="Nhập email đăng ký tài khoản" required autocomplete="email">
            </div>

            <button type="submit" class="login-btn" id="forgotBtn">Gửi Yêu Cầu</button>
            
            <div class="auth-links center">
                <a href="#" onclick="showForm('login')">Quay lại Đăng nhập</a>
            </div>
        </form>

        <p class="footer-note">C69 Management Dashboard &copy; 2026. All rights reserved.</p>
    </div>

    <script>
        const errorBox = document.getElementById('errorBox');
        const csrfToken = document.getElementById('csrfToken').value;

        // Toggle Views
        function showForm(formId) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('forgotForm').style.display = 'none';
            
            errorBox.style.display = 'none';
            // Reset errorBox style
            errorBox.style.background = 'rgba(239, 68, 68, 0.1)';
            errorBox.style.borderColor = 'rgba(239, 68, 68, 0.2)';
            errorBox.style.color = 'var(--error-color)';
            
            const headerTitle = document.getElementById('headerTitle');
            const headerDesc = document.getElementById('headerDesc');
            
            if (formId === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                headerTitle.textContent = 'C69 Portal 🚀';
                headerDesc.textContent = 'Hệ thống quản lý dịch vụ và khách hàng';
            } else if (formId === 'register') {
                document.getElementById('registerForm').style.display = 'block';
                headerTitle.textContent = 'Đăng Ký 📝';
                headerDesc.textContent = 'Tạo tài khoản khách hàng mới';
            } else if (formId === 'forgot') {
                document.getElementById('forgotForm').style.display = 'block';
                headerTitle.textContent = 'Quên Mật Khẩu 🔒';
                headerDesc.textContent = 'Nhập email để khôi phục mật khẩu';
            }
        }

        // Query Param Error
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'unauthorized') {
            errorBox.textContent = 'Tài khoản không được quyền truy cập. Vui lòng đăng nhập lại.';
            errorBox.style.display = 'block';
        }

        // 1. Submit Login
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Đang đăng nhập...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/dashboard/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = '/dashboard/';
                } else {
                    errorBox.textContent = data.message || 'Lỗi đăng nhập. Vui lòng thử lại.';
                    errorBox.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Đăng Nhập';
                }
            } catch (err) {
                errorBox.textContent = 'Lỗi kết nối máy chủ. Vui lòng kiểm tra mạng.';
                errorBox.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Đăng Nhập';
            }
        });

        // 2. Submit Register
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm_password = document.getElementById('regConfirmPassword').value;
            
            if (password !== confirm_password) {
                errorBox.textContent = 'Mật khẩu xác nhận không khớp.';
                errorBox.style.display = 'block';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'Đang đăng ký...';
            
            try {
                const response = await fetch('/dashboard/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ username, email, password, confirm_password })
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    window.location.href = '/dashboard/';
                } else {
                    errorBox.textContent = data.message || 'Đăng ký thất bại. Vui lòng thử lại.';
                    errorBox.style.display = 'block';
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Đăng Ký';
                }
            } catch (err) {
                errorBox.textContent = 'Lỗi kết nối máy chủ. Vui lòng kiểm tra mạng.';
                errorBox.style.display = 'block';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Đăng Ký';
            }
        });

        // 3. Submit Forgot Password
        const forgotForm = document.getElementById('forgotForm');
        const forgotBtn = document.getElementById('forgotBtn');
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            
            const email = document.getElementById('forgotEmail').value.trim();
            forgotBtn.disabled = true;
            forgotBtn.textContent = 'Đang gửi yêu cầu...';
            
            try {
                const response = await fetch('/dashboard/forgot-password/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    errorBox.textContent = data.message || 'Email khôi phục mật khẩu đã được gửi.';
                    errorBox.style.background = 'rgba(16, 185, 129, 0.1)';
                    errorBox.style.borderColor = 'rgba(16, 185, 129, 0.2)';
                    errorBox.style.color = '#10b981';
                    errorBox.style.display = 'block';
                    
                    document.getElementById('forgotEmail').value = '';
                    forgotBtn.disabled = false;
                    forgotBtn.textContent = 'Gửi Yêu Cầu';
                } else {
                    errorBox.textContent = data.message || 'Không thể gửi yêu cầu đặt lại mật khẩu.';
                    errorBox.style.display = 'block';
                    forgotBtn.disabled = false;
                    forgotBtn.textContent = 'Gửi Yêu Cầu';
                }
            } catch (err) {
                errorBox.textContent = 'Lỗi kết nối máy chủ. Vui lòng kiểm tra mạng.';
                errorBox.style.display = 'block';
                forgotBtn.disabled = false;
                forgotBtn.textContent = 'Gửi Yêu Cầu';
            }
        });
    </script>
</body>
</html>

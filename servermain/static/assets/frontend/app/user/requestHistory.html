<div class="padding-top-30 padding-bottom-30">
    <div class="row padding-bottom-100">
        <div class="large-10 push-2 columns">
          <h5>Request History</h5>
          <table role="grid" class="table fixed_layout">
            <thead>
              <tr>
                <th>Action</th>
                <th>Status</th>
                <th>Created date</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="applyHistory in applyHistories">
                <td>{{applyHistory.apply_type | enumApplyType}}</td>
                <td class="{{ (applyHistory.apply_status === 0 || applyHistory.apply_status === 1) ? 'success' : 'danger' }}">{{applyHistory.apply_status | enumApplyStatus}}</td>
                <td>{{ applyHistory.created_date | date:'medium':'UTC' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="large-2 pull-10 columns">
            <div ng-include src="'/static/assets/frontend/app/user/sidebar.html'"></div>
        </div>
    </div>
</div>
